<div class="background-color">
  <div class="login-card">
    <div class="row">
      <div class="col-md-4">
        <div class="right-side">
          <img src="/image1.png" alt="" class="login-image" />
          <h1 class="welcome">Welcome Back!</h1>
          <p class="description">
            To keep connected with us please login with your personal info
          </p>
        </div>
      </div>
      <div class="col-md-8" style="padding: 30px;">
        <h2 class="title">Login To Your Account</h2>
        <p class="subtitle">Enter your email and password</p>

        <div class="field-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input
              id="email"
              type="email"
              placeholder="Enter your email"
              [(ngModel)]="email"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Enter your password"
              [(ngModel)]="password"
            />
            <button class="toggle-password" type="button" (click)="togglePassword()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="options">
          <div class="remember">
            <input id="remember" type="checkbox" />
            <label for="remember">Remember Me</label>
          </div>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

        <div class="button">
          <button class="login-btn" (click)="onLogin()">Login</button>
        </div>

        <p class="hint">Use any valid email and any password to login</p>
      </div>
    </div>
  </div>
</div>
